<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Presentador</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        .slide-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .slide-preview img.active {
            display: block;
        }
    </style>
</head>

<body class="sh bg-sh-deep antialiased min-h-screen lg:h-screen flex flex-col overflow-y-auto lg:overflow-hidden">

    <!-- ═══ Topbar ═══ -->
    <nav class="sh-nav" style="position: sticky;">
        <div class="sh-nav-inner">
            <div class="flex items-center gap-3">
                <span class="font-brand text-base tracking-tight">Presentador</span>
                <div class="sh-status ml-1 hidden sm:inline-flex">
                    <span class="sh-dot"></span>
                    <span class="sh-label">LIVE</span>
                </div>
            </div>

            <!-- Nav Controls -->
            <div class="flex items-center gap-2">
                <button class="sh-btn text-xs py-1 px-2.5" id="btn-prev" disabled>
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <span id="slide-counter" class="font-mono text-sm text-[var(--sh-text-3)] min-w-[5rem] text-center">
                    &mdash; / &mdash;
                </span>
                <button class="sh-btn text-xs py-1 px-2.5" id="btn-next" disabled>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>

                <a href="/presentations" class="sh-btn sh-btn-ghost text-xs ml-2">
                    <i class="fa-solid fa-folder-open"></i>
                    <span class="hidden sm:inline">Presentaciones</span>
                </a>
                <a href="/main-panel" class="sh-btn sh-btn-ghost text-xs">
                    <i class="fa-solid fa-table-cells-large"></i>
                    <span class="hidden sm:inline">Panel</span>
                </a>
                <a th:href="@{/auth/profile}" class="sh-btn sh-btn-ghost text-xs">
                    <i class="fa-solid fa-user"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- ═══ Content: Slide + Notes ═══ -->
    <div class="flex flex-1 flex-col lg:flex-row overflow-y-auto lg:overflow-hidden">

        <!-- Slide Preview -->
        <div class="slide-preview flex-1 min-h-[42vh] lg:min-h-0 bg-black flex items-center justify-center relative"
            id="slide-area">
            <!-- Slides injected by JS -->
        </div>

        <!-- Notes Panel -->
        <div class="w-full lg:w-[380px] lg:min-w-[280px] bg-sh-card border-t lg:border-t-0 lg:border-l border-[var(--sh-border)] overflow-y-auto p-4 sm:p-5 flex flex-col gap-5"
            id="notes-panel">

            <!-- Notas IA -->
            <div>
                <div class="sh-label mb-4">
                    <i class="fa-solid fa-note-sticky mr-1"></i>NOTAS DEL PRESENTADOR
                </div>
                <div id="notes-content">
                    <div class="text-center mt-12 text-[var(--sh-text-3)]">
                        <i class="fa-solid fa-robot text-2xl mb-3 block opacity-40"></i>
                        <p class="text-xs font-mono leading-relaxed">
                            Las notas IA aparecerán aquí.<br>
                            Genéralas desde el panel maestro.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Panel de preguntas del stream -->
            <div id="questions-panel" style="display:none;">
                <div class="sh-label mb-3 flex items-center justify-between">
                    <span><i class="fa-solid fa-circle-question mr-1"></i>PREGUNTAS EN VIVO</span>
                    <span id="q-pending-badge" class="sh-badge" style="display:none;"></span>
                </div>
                <div id="q-list" class="flex flex-col gap-2">
                    <p class="text-xs font-mono text-[var(--sh-text-3)]">Sin preguntas aún.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ Scripts ═══ -->
    <script th:inline="javascript">
        const POLL_INTERVAL_MS = /*[[${pollIntervalMs}]]*/ 1500;
        const API_SLIDE_URL = '/api/slide';
        const PRESENTATION_ID = /*[[${presentationId}]]*/ '';
        const SLIDES_CATALOG_API = PRESENTATION_ID ? `/api/presentations/${PRESENTATION_ID}/slides` : '';
        const DEVICE_TYPE = 'presenter';
        const DEVICE_STORAGE_KEY = `device-token:${DEVICE_TYPE}:${PRESENTATION_ID || 'global'}`;

        let currentSlide = 0;
        let totalSlides = 0;
        let slideUrls = [];
        let deviceToken = localStorage.getItem(DEVICE_STORAGE_KEY) || '';
        const slideArea = document.getElementById('slide-area');
        const counter = document.getElementById('slide-counter');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function ensureDeviceToken() {
            if (deviceToken) {
                return deviceToken;
            }
            const generated = (window.crypto && crypto.randomUUID)
                ? crypto.randomUUID()
                : `dev-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
            deviceToken = generated;
            localStorage.setItem(DEVICE_STORAGE_KEY, generated);
            return generated;
        }

        async function sendDeviceHeartbeat(register = false) {
            const endpoint = register ? '/api/devices/register' : '/api/devices/heartbeat';
            try {
                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: `presenter-${PRESENTATION_ID || 'default'}`,
                        type: DEVICE_TYPE,
                        token: ensureDeviceToken()
                    })
                });
            } catch (_) { }
        }

        if (PRESENTATION_ID) {
            const panelLink = document.querySelector('a[href="/main-panel"]');
            if (panelLink) {
                panelLink.href = `/main-panel?presentationId=${encodeURIComponent(PRESENTATION_ID)}`;
            }
        }

        function buildSlides(total) {
            slideArea.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const img = document.createElement('img');
                const url = slideUrls[i - 1] || `/presentation/Slide${i}.PNG`;
                img.src = url;
                img.alt = `Slide ${i}`;
                img.id = `pres-slide-${i}`;
                slideArea.appendChild(img);
            }
        }

        async function loadSlidesCatalog() {
            if (!SLIDES_CATALOG_API) {
                slideUrls = [];
                return;
            }
            try {
                const res = await fetch(SLIDES_CATALOG_API);
                if (!res.ok) {
                    slideUrls = [];
                    return;
                }
                const data = await res.json();
                slideUrls = (data.slides || [])
                    .sort((a, b) => a.number - b.number)
                    .map(slide => PRESENTATION_ID
                        ? `/api/presentations/${PRESENTATION_ID}/slides/${slide.number}/image`
                        : (slide.s3Url || `/presentation/Slide${slide.number}.PNG`));
                if (slideUrls.length > 0) {
                    totalSlides = slideUrls.length;
                    buildSlides(totalSlides);
                }
            } catch (_) {
                slideUrls = [];
            }
        }

        function showSlide(n) {
            document.querySelectorAll('#slide-area img.active')
                .forEach(el => el.classList.remove('active'));
            const s = document.getElementById(`pres-slide-${n}`);
            if (s) s.classList.add('active');
            counter.textContent = `${n} / ${totalSlides}`;
            btnPrev.disabled = n <= 1;
            btnNext.disabled = n >= totalSlides;
        }

        async function fetchState() {
            try {
                const res = await fetch(API_SLIDE_URL);
                if (!res.ok) return;
                const data = await res.json();
                const effectiveTotal = slideUrls.length > 0 ? slideUrls.length : data.totalSlides;
                if (effectiveTotal !== totalSlides) {
                    totalSlides = effectiveTotal;
                    buildSlides(totalSlides);
                }
                if (data.slide !== currentSlide) {
                    currentSlide = data.slide;
                    showSlide(currentSlide);
                }
            } catch (_) { }
        }

        async function navigate(delta) {
            const target = currentSlide + delta;
            if (target < 1 || target > totalSlides) return;
            try {
                await fetch(API_SLIDE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slide: target, totalSlides })
                });
                currentSlide = target;
                showSlide(currentSlide);
            } catch (_) { }
        }

        btnPrev.addEventListener('click', () => navigate(-1));
        btnNext.addEventListener('click', () => navigate(1));

        loadSlidesCatalog().finally(fetchState);
        setInterval(fetchState, POLL_INTERVAL_MS);
        sendDeviceHeartbeat(true);
        setInterval(() => sendDeviceHeartbeat(false), 30000);
    </script>

    <!-- Q&A Polling Script (only when presentationId is present) -->
    <script th:if="${presentationId != null and presentationId != ''}" th:inline="javascript">
        (function () {
            const PRES_ID = /*[[${presentationId}]]*/ '';
            if (!PRES_ID) return;

            const Q_API = `/api/presentations/${PRES_ID}/questions`;
            const qPanel = document.getElementById('questions-panel');
            const qList = document.getElementById('q-list');
            const qBadge = document.getElementById('q-pending-badge');

            async function pollQuestions() {
                try {
                    const res = await fetch(`${Q_API}?status=PENDING`);
                    if (!res.ok) return;
                    const questions = await res.json();

                    qPanel.style.display = 'block';

                    if (questions.length === 0) {
                        qList.innerHTML = '<p class="text-xs font-mono text-[var(--sh-text-3)]">Sin preguntas pendientes.</p>';
                        qBadge.style.display = 'none';
                        return;
                    }

                    qBadge.style.display = 'inline';
                    qBadge.textContent = questions.length;

                    qList.innerHTML = questions.map(q => `
                        <div class="bg-[var(--sh-deep)] border border-[var(--sh-border)] rounded-tech p-3 text-xs">
                            <div class="flex justify-between items-start gap-2 mb-1">
                                <span class="font-mono text-[var(--sh-blue)] text-[0.65rem]">
                                    ${q.anonymous ? '<i class="fa-solid fa-user-secret"></i> Anónimo' : escHtml(q.displayName || 'Sin nombre')}
                                </span>
                                <span class="text-[var(--sh-text-3)] text-[0.6rem] shrink-0">
                                    ${q.upvotes > 0 ? `▲ ${q.upvotes}` : ''}
                                </span>
                            </div>
                            <p class="text-[var(--sh-text-1)] leading-relaxed mb-2">${escHtml(q.content)}</p>
                            <div class="flex gap-1">
                                <button onclick="markQuestion('${q.id}', 'ANSWERED')"
                                    class="sh-btn text-[0.65rem] py-0.5 px-2">
                                    <i class="fa-solid fa-check"></i> Respondida
                                </button>
                                <button onclick="markQuestion('${q.id}', 'DISMISSED')"
                                    class="sh-btn sh-btn-ghost text-[0.65rem] py-0.5 px-2">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                        </div>
                    `).join('');
                } catch (_) {}
            }

            window.markQuestion = async function (questionId, status) {
                try {
                    await fetch(`${Q_API}/${questionId}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status })
                    });
                    pollQuestions();
                } catch (_) {}
            };

            function escHtml(str) {
                if (!str) return '';
                return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }

            pollQuestions();
            setInterval(pollQuestions, 5000);
        })();
    </script>
</body>

</html>
