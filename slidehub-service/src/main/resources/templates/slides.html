<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <!--

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Proyector</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .slide.active {
            display: block;
        }

        #error-msg {
            display: none;
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: rgba(248, 81, 73, 0.85);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        /* ── Q&A Widget ── */
        #qa-fab {
            display: none;
            position: fixed;
            bottom: 1.25rem;
            left: 1.25rem;
            background: rgba(30, 41, 59, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 130, 255, 0.35);
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: #94a3b8;
            cursor: pointer;
            gap: 0.4rem;
            align-items: center;
            z-index: 100;
            transition: background 0.15s, border-color 0.15s;
        }
        #qa-fab:hover { background: rgba(40, 55, 80, 0.95); border-color: rgba(99, 130, 255, 0.6); }
        #qa-fab .qa-hand-badge {
            background: rgba(245, 158, 11, 0.25);
            color: #f59e0b;
            border-radius: 999px;
            padding: 0 0.35rem;
            font-size: 0.65rem;
        }
        #qa-panel {
            display: none;
            position: fixed;
            bottom: 4rem;
            left: 1.25rem;
            width: min(340px, calc(100vw - 2.5rem));
            background: rgba(15, 23, 42, 0.97);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(99, 130, 255, 0.25);
            border-radius: 12px;
            padding: 1rem;
            z-index: 101;
            font-family: 'JetBrains Mono', monospace;
            color: #94a3b8;
        }
        #qa-panel .qa-title {
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: #6366f1;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #qa-panel input, #qa-panel textarea {
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 130, 255, 0.2);
            border-radius: 6px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.75rem;
            padding: 0.4rem 0.6rem;
            margin-bottom: 0.5rem;
            outline: none;
            resize: none;
        }
        #qa-panel input:focus, #qa-panel textarea:focus {
            border-color: rgba(99, 130, 255, 0.5);
        }
        #qa-panel .qa-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.72rem;
        }
        #qa-panel .qa-btn {
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.4rem 0.75rem;
            font-family: inherit;
            font-size: 0.72rem;
            cursor: pointer;
            width: 100%;
            margin-top: 0.25rem;
        }
        #qa-panel .qa-btn:disabled { opacity: 0.5; cursor: default; }
        #qa-panel .qa-btn-hand {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #f59e0b;
            border-radius: 6px;
            padding: 0.35rem 0.6rem;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        #qa-panel .qa-btn-hand.active {
            background: rgba(245, 158, 11, 0.3);
        }
        #qa-panel .qa-msg {
            font-size: 0.68rem;
            text-align: center;
            margin-top: 0.4rem;
            min-height: 1em;
        }
        #qa-panel .qa-msg.ok { color: #34d399; }
        #qa-panel .qa-msg.err { color: #f87171; }
        #qa-viewer-count {
            display: none;
            position: fixed;
            top: 0.75rem;
            left: 0.75rem;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(99, 130, 255, 0.2);
            border-radius: 999px;
            padding: 0.2rem 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #64748b;
            z-index: 50;
        }
    </style>
</head>

<body>
    <div class="slide-wrapper" id="slide-wrapper"></div>
    <div id="error-msg">CONNECTION LOST</div>

    <!-- Viewer count badge (top-left, visible solo cuando hay sesión) -->
    <div id="qa-viewer-count"></div>

    <!-- Q&A FAB button -->
    <div id="qa-fab">
        <span>&#10067; Preguntar</span>
        <span id="qa-hand-badge" class="qa-hand-badge" style="display:none;"></span>
    </div>

    <!-- Q&A Panel -->
    <div id="qa-panel">
        <div class="qa-title">
            <span>&#128172; PREGUNTAS EN VIVO</span>
            <button onclick="toggleQaPanel()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:0.9rem;">&#10005;</button>
        </div>

        <!-- Step 1: setup name (hidden once joined) -->
        <div id="qa-setup">
            <input id="qa-name" type="text" maxlength="100" placeholder="Tu nombre (opcional)">
            <div class="qa-row">
                <input type="checkbox" id="qa-anon" style="width:auto;margin:0;">
                <label for="qa-anon" style="font-size:0.72rem;cursor:pointer;">Enviar de forma anónima</label>
            </div>
            <button class="qa-btn" id="qa-join-btn" onclick="qaJoin()">Unirse a la sesión</button>
        </div>

        <!-- Step 2: send question (hidden until joined) -->
        <div id="qa-form" style="display:none;">
            <div class="qa-row" style="justify-content:space-between;">
                <span id="qa-identity" style="font-size:0.68rem;color:#6366f1;"></span>
                <button class="qa-btn-hand" id="qa-hand-btn" onclick="qaToggleHand()">&#9995; Mano</button>
            </div>
            <textarea id="qa-content" rows="3" maxlength="500" placeholder="Escribe tu pregunta..."></textarea>
            <button class="qa-btn" id="qa-send-btn" onclick="qaSend()">Enviar pregunta</button>
        </div>

        <div class="qa-msg" id="qa-msg"></div>
    </div>

    <script th:inline="javascript">
        const POLL_INTERVAL_MS = /*[[${pollIntervalMs}]]*/ 1000;
        const API_SLIDE_URL = '/api/slide';
        const PRESENTATION_ID = /*[[${presentationId}]]*/ '';
        const SLIDES_CATALOG_API = PRESENTATION_ID ? `/api/presentations/${PRESENTATION_ID}/slides` : '';
        const DEVICE_TYPE = 'slides-screen';
        const DEVICE_STORAGE_KEY = `device-token:${DEVICE_TYPE}:${PRESENTATION_ID || 'global'}`;

        let currentSlide = 0;
        let totalSlides = 0;
        let slideUrls = [];
        let deviceToken = localStorage.getItem(DEVICE_STORAGE_KEY) || '';
        const wrapper = document.getElementById('slide-wrapper');
        const errorMsg = document.getElementById('error-msg');

        function ensureDeviceToken() {
            if (deviceToken) {
                return deviceToken;
            }
            const generated = (window.crypto && crypto.randomUUID)
                ? crypto.randomUUID()
                : `dev-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
            deviceToken = generated;
            localStorage.setItem(DEVICE_STORAGE_KEY, generated);
            return generated;
        }

        async function sendDeviceHeartbeat(register = false) {
            const endpoint = register ? '/api/devices/register' : '/api/devices/heartbeat';
            try {
                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: `slides-${PRESENTATION_ID || 'public'}`,
                        type: DEVICE_TYPE,
                        token: ensureDeviceToken()
                    })
                });
            } catch (_) { }
        }

        function buildSlides(total) {
            wrapper.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const img = document.createElement('img');
                const url = slideUrls[i - 1] || `/presentation/Slide${i}.PNG`;
                img.src = url;
                img.alt = `Slide ${i}`;
                img.className = 'slide';
                img.id = `slide-${i}`;
                wrapper.appendChild(img);
            }
        }

        async function loadSlidesCatalog() {
            if (!SLIDES_CATALOG_API) { slideUrls = []; return; }
            try {
                const res = await fetch(SLIDES_CATALOG_API);
                if (!res.ok) { slideUrls = []; return; }
                const data = await res.json();
                slideUrls = (data.slides || [])
                    .sort((a, b) => a.number - b.number)
                    .map(slide => PRESENTATION_ID
                        ? `/api/presentations/${PRESENTATION_ID}/slides/${slide.number}/image`
                        : (slide.s3Url || `/presentation/Slide${slide.number}.PNG`));
                if (slideUrls.length > 0) { totalSlides = slideUrls.length; buildSlides(totalSlides); }
            } catch (_) { slideUrls = []; }
        }

        function showSlide(n) {
            document.querySelectorAll('.slide.active').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`slide-${n}`);
            if (target) target.classList.add('active');
        }

        async function poll() {
            try {
                const res = await fetch(API_SLIDE_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                errorMsg.style.display = 'none';
                const effectiveTotal = slideUrls.length > 0 ? slideUrls.length : data.totalSlides;
                if (effectiveTotal !== totalSlides) { totalSlides = effectiveTotal; buildSlides(totalSlides); }
                if (data.slide !== currentSlide) { currentSlide = data.slide; showSlide(currentSlide); }
            } catch (e) { errorMsg.style.display = 'block'; }
        }

        loadSlidesCatalog().finally(poll);
        setInterval(poll, POLL_INTERVAL_MS);
        sendDeviceHeartbeat(true);
        setInterval(() => sendDeviceHeartbeat(false), 30000);
    </script>

    <!-- Q&A Widget Script -->
    <script th:if="${presentationId != null and presentationId != ''}" th:inline="javascript">
        (function () {
            const PRES_ID = /*[[${presentationId}]]*/ '';
            if (!PRES_ID) return;

            const QA_BASE = `/api/presentations/${PRES_ID}`;
            const STORAGE_KEY = `qa-viewer:${PRES_ID}`;

            let viewerToken = null;
            let sessionId = null;
            let handRaised = false;
            let qaEnabled = false;
            let anonAllowed = false;
            let passiveToken = null;  // token de registro automático (sin Q&A)

            const PASSIVE_STORAGE_KEY = `qa-passive:${PRES_ID}`;

            const fab = document.getElementById('qa-fab');
            const panel = document.getElementById('qa-panel');
            const viewerCountEl = document.getElementById('qa-viewer-count');
            const handBadge = document.getElementById('qa-hand-badge');
            const handBtn = document.getElementById('qa-hand-btn');
            const qaSetup = document.getElementById('qa-setup');
            const qaForm = document.getElementById('qa-form');
            const qaIdentity = document.getElementById('qa-identity');
            const qaMsg = document.getElementById('qa-msg');
            const qaAnonChk = document.getElementById('qa-anon');

            function showMsg(text, type) {
                qaMsg.textContent = text;
                qaMsg.className = 'qa-msg ' + type;
                if (type === 'ok') setTimeout(() => { qaMsg.textContent = ''; qaMsg.className = 'qa-msg'; }, 3000);
            }

            window.toggleQaPanel = function () {
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            };

            fab.addEventListener('click', toggleQaPanel);

            async function autoPassiveJoin() {
                try {
                    const res = await fetch(`${QA_BASE}/stream/join`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ displayName: '' })
                    });
                    if (!res.ok) return;
                    const data = await res.json();
                    passiveToken = data.viewerToken;
                    sessionStorage.setItem(PASSIVE_STORAGE_KEY, passiveToken);
                    setInterval(() => passiveHeartbeat(), 30000);
                } catch (_) {}
            }

            async function passiveHeartbeat() {
                if (!passiveToken) return;
                try {
                    await fetch(`${QA_BASE}/stream/heartbeat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ viewerToken: passiveToken })
                    });
                } catch (_) {}
            }

            async function leavePassive() {
                const token = passiveToken || sessionStorage.getItem(PASSIVE_STORAGE_KEY);
                if (!token) return;
                passiveToken = null;
                sessionStorage.removeItem(PASSIVE_STORAGE_KEY);
                try {
                    navigator.sendBeacon(`${QA_BASE}/stream/leave`,
                        new Blob([JSON.stringify({ viewerToken: token })], { type: 'application/json' }));
                } catch (_) {}
            }

            async function init() {
                try {
                    const res = await fetch(`${QA_BASE}/questions/settings`);
                    if (!res.ok) return;
                    const cfg = await res.json();
                    qaEnabled = cfg.questionsEnabled;
                    anonAllowed = cfg.allowAnonymousQuestions;
                    if (!qaEnabled) return;

                    // Restore session from sessionStorage
                    const stored = sessionStorage.getItem(STORAGE_KEY);
                    if (stored) {
                        try {
                            const parsed = JSON.parse(stored);
                            viewerToken = parsed.viewerToken;
                            sessionId = parsed.sessionId;
                            showJoined(parsed.displayName, parsed.anonymous);
                        } catch (_) { sessionStorage.removeItem(STORAGE_KEY); }
                    }

                    // Auto-register como viewer pasivo para ser contado inmediatamente
                    if (!viewerToken) {
                        const storedPassive = sessionStorage.getItem(PASSIVE_STORAGE_KEY);
                        if (storedPassive) {
                            passiveToken = storedPassive;
                            setInterval(() => passiveHeartbeat(), 30000);
                        } else {
                            await autoPassiveJoin();
                        }
                    }

                    if (!anonAllowed) {
                        qaAnonChk.parentElement.style.display = 'none';
                    }

                    fab.style.display = 'flex';
                    viewerCountEl.style.display = 'block';
                    pollStats();
                    setInterval(pollStats, 5000);
                    if (viewerToken) {
                        setInterval(heartbeat, 30000);
                    }
                } catch (_) {}
            }

            window.qaJoin = async function () {
                const nameVal = document.getElementById('qa-name').value.trim();
                const anon = qaAnonChk.checked;
                // Liberar el token pasivo antes de unirse con nombre/anónimo
                await leavePassive();
                try {
                    const res = await fetch(`${QA_BASE}/stream/join`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ displayName: anon ? '' : nameVal })
                    });
                    if (!res.ok) { showMsg('No hay sesión activa.', 'err'); return; }
                    const data = await res.json();
                    viewerToken = data.viewerToken;
                    sessionId = data.sessionId;
                    const displayName = anon ? null : (nameVal || null);
                    sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ viewerToken, sessionId, displayName, anonymous: anon }));
                    showJoined(displayName, anon);
                    setInterval(heartbeat, 30000);
                } catch (_) { showMsg('Error al unirse.', 'err'); }
            };

            function showJoined(displayName, anon) {
                qaSetup.style.display = 'none';
                qaForm.style.display = 'block';
                qaIdentity.textContent = anon ? '(anónimo)' : (displayName ? `Hola, ${displayName}` : '(sin nombre)');
            }

            window.qaSend = async function () {
                const content = document.getElementById('qa-content').value.trim();
                if (!content) { showMsg('Escribe tu pregunta.', 'err'); return; }
                const stored = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || '{}');
                const sendBtn = document.getElementById('qa-send-btn');
                sendBtn.disabled = true;
                try {
                    const res = await fetch(`${QA_BASE}/questions/submit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            viewerToken,
                            displayName: stored.displayName || null,
                            anonymous: stored.anonymous || false,
                            content
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) { showMsg(data.error || 'Error al enviar.', 'err'); return; }
                    document.getElementById('qa-content').value = '';
                    showMsg('¡Pregunta enviada!', 'ok');
                } catch (_) { showMsg('Error al enviar.', 'err'); }
                finally { sendBtn.disabled = false; }
            };

            window.qaToggleHand = async function () {
                if (!viewerToken || handBtn.disabled) return;
                const next = !handRaised;
                handBtn.disabled = true;
                try {
                    const res = await fetch(`${QA_BASE}/stream/hand`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ viewerToken, raised: next })
                    });
                    if (res.ok || res.status === 204) {
                        handRaised = next;
                        handBtn.classList.toggle('active', handRaised);
                        handBadge.style.display = handRaised ? 'inline' : 'none';
                        handBadge.textContent = '✋';
                    }
                } catch (_) {
                    // fallo de red — estado no cambia
                } finally {
                    handBtn.disabled = false;
                }
            };

            async function heartbeat() {
                if (!viewerToken) return;
                try {
                    await fetch(`${QA_BASE}/stream/heartbeat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ viewerToken })
                    });
                } catch (_) {}
            }

            async function pollStats() {
                try {
                    const res = await fetch(`${QA_BASE}/stream/stats`);
                    if (!res.ok) return;
                    const data = await res.json();
                    viewerCountEl.textContent = `👁 ${data.viewerCount}` +
                        (data.handCount > 0 ? `  ✋ ${data.handCount}` : '');
                } catch (_) {}
            }

            window.addEventListener('beforeunload', () => {
                if (viewerToken) {
                    navigator.sendBeacon(`${QA_BASE}/stream/leave`,
                        new Blob([JSON.stringify({ viewerToken })], { type: 'application/json' }));
                }
                // Limpiar también el token pasivo si no se unió por Q&A
                const passive = passiveToken || sessionStorage.getItem(PASSIVE_STORAGE_KEY);
                if (passive) {
                    navigator.sendBeacon(`${QA_BASE}/stream/leave`,
                        new Blob([JSON.stringify({ viewerToken: passive })], { type: 'application/json' }));
                }
            });

            init();
        })();
    </script>
</body>

</html>
