<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Nueva Contraseña</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>

<body class="sh bg-sh-deep antialiased min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-[360px] sh-fade-in">

        <!-- ── Logo + Label ── -->
        <div class="text-center mb-8">
            <h1 class="font-brand text-5xl text-[var(--sh-text-1)] mb-3">SlideHub</h1>
            <div class="sh-label mt-1">RESTABLECER CONTRASEÑA</div>
        </div>

        <!-- ── Auth Card ── -->
        <div class="sh-card p-6">

            <!-- Alerts -->
            <div th:if="${errorMessage}" class="sh-alert sh-alert-error mb-4">
                <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                <span th:text="${errorMessage}">Error</span>
            </div>

            <!-- Formulario de reseteo -->
            <p class="text-sm text-[var(--sh-text-3)] mb-4 text-center">
                Establece tu nueva contraseña de acceso.
            </p>
            <form method="post" th:action="@{/auth/reset-password}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}">
                <input type="hidden" name="token" th:value="${token}">
                
                <div class="mb-4">
                    <label for="password" class="sh-input-label">Nueva contraseña</label>
                    <input type="password" class="sh-input" id="password" name="password" minlength="8"
                        placeholder="Mínimo 8 caracteres" required autofocus>
                </div>

                <div class="mb-5">
                    <label for="confirmPassword" class="sh-input-label">Confirmar contraseña</label>
                    <input type="password" class="sh-input" id="confirmPassword" name="confirmPassword" minlength="8"
                        placeholder="Mínimo 8 caracteres" required>
                </div>

                <button type="submit" class="sh-btn sh-btn-primary w-full justify-center">
                    <i class="fa-solid fa-key"></i>
                    Guardar nueva contraseña
                </button>
            </form>

            <div class="mt-4 text-center">
                <a th:href="@{/auth/login}" class="text-[var(--sh-blue)] text-sm hover:underline">
                    Cancelar
                </a>
            </div>
        </div>
    </div>
</body>
</html>
