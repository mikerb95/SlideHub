<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Registro</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>

<body class="sh bg-sh-deep antialiased min-h-screen flex items-center justify-center px-4 py-8">

    <div class="w-full max-w-[380px] sh-fade-in">

        <!-- ── Logo + Label ── -->
        <div class="text-center mb-8">

            <h1 class="font-brand text-2xl text-[var(--sh-text-1)]">SlideHub</h1>
            <div class="sh-label mt-1">CREAR CUENTA</div>
        </div>

        <!-- ── Register Card ── -->
        <div class="sh-card p-6">

            <!-- Alerts -->
            <div th:if="${errorMessage}" class="sh-alert sh-alert-error mb-4">
                <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                <span th:text="${errorMessage}">Error</span>
            </div>
            <div th:if="${successMessage}" class="sh-alert sh-alert-success mb-4">
                <i class="fa-solid fa-circle-check mt-0.5"></i>
                <span th:text="${successMessage}">Éxito</span>
            </div>

            <!-- Formulario de registro -->
            <form method="post" th:action="@{/auth/register}" th:unless="${successMessage}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}">

                <div class="mb-4">
                    <label for="username" class="sh-input-label">Nombre de usuario</label>
                    <input type="text" class="sh-input" id="username" name="username" autocomplete="username"
                        placeholder="system_user" minlength="3" maxlength="50" required>
                </div>

                <div class="mb-4">
                    <label for="email" class="sh-input-label">Correo electrónico</label>
                    <input type="email" class="sh-input" id="email" name="email" autocomplete="email"
                        placeholder="user@node.io" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="sh-input-label">Contraseña</label>
                    <input type="password" class="sh-input" id="password" name="password" autocomplete="new-password"
                        placeholder="Mínimo 8 caracteres" minlength="8" required>
                    <div id="password-strength-feedback" class="pwd-feedback warn mt-1 text-xs">Mínimo 8 caracteres.</div>
                </div>

                <div class="mb-5">
                    <label for="confirmPassword" class="sh-input-label">Confirmar contraseña</label>
                    <input type="password" class="sh-input" id="confirmPassword" name="confirmPassword"
                        autocomplete="new-password" placeholder="Repite la contraseña" minlength="8" required>
                    <div id="password-match-feedback" class="pwd-feedback warn mt-1 text-xs">Confirma la contraseña para continuar.</div>
                </div>

                <button type="submit" class="sh-btn sh-btn-blue w-full justify-center">
                    <i class="fa-solid fa-user-plus"></i>
                    Crear cuenta
                </button>
            </form>

            <!-- OAuth Separator -->
            <div th:unless="${successMessage}" class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px bg-[var(--sh-border)]"></div>
                <span class="sh-label">O CONTINUAR CON</span>
                <div class="flex-1 h-px bg-[var(--sh-border)]"></div>
            </div>

            <!-- OAuth Buttons -->
            <div th:unless="${successMessage}" class="flex gap-3">
                <a href="/oauth2/authorization/github" class="sh-btn flex-1 justify-center">
                    <i class="fa-brands fa-github"></i>
                    GitHub
                </a>
                <a href="/oauth2/authorization/google" class="sh-btn flex-1 justify-center">
                    <i class="fa-brands fa-google"></i>
                    Google
                </a>
            </div>
        </div>

        <!-- Footer link -->
        <div class="text-center mt-5">
            <span class="text-[var(--sh-text-3)] text-sm">¿Ya tienes cuenta?</span>
            <a th:href="@{/auth/login}" class="text-[var(--sh-blue)] text-sm ml-1 hover:underline">
                Iniciar sesión
            </a>
        </div>
    </div>

    <script>
        (function () {
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const strengthFeedback = document.getElementById('password-strength-feedback');
            const matchFeedback = document.getElementById('password-match-feedback');
            const submitBtn = document.querySelector('button[type="submit"]');

            if (!passwordInput || !strengthFeedback) return;

            function setFeedback(el, message, type) {
                el.textContent = message;
                el.classList.remove('ok', 'warn', 'error');
                el.classList.add(type);
            }

            function evaluateStrength(password) {
                if (password.length < 8) {
                    return { valid: false, message: 'Muy corta (mínimo 8 caracteres).', type: 'error' };
                }

                const hasUpper = /[A-Z]/.test(password);
                const hasLower = /[a-z]/.test(password);
                const hasDigit = /\d/.test(password);
                const hasSymbol = /[^A-Za-z0-9]/.test(password);
                const score = [hasUpper, hasLower, hasDigit, hasSymbol].filter(Boolean).length;

                if (score <= 1) {
                    return { valid: true, message: 'Válida, pero débil. Recomendado: mayúsculas, números y símbolos.', type: 'warn' };
                }

                if (score === 2 || score === 3) {
                    return { valid: true, message: 'Contraseña aceptable.', type: 'ok' };
                }

                return { valid: true, message: 'Contraseña fuerte.', type: 'ok' };
            }

            function validate() {
                const password = passwordInput.value || '';
                const confirmation = confirmInput.value || '';

                const strength = evaluateStrength(password);
                setFeedback(strengthFeedback, strength.message, strength.type);

                let matchValid = false;
                if (!confirmation) {
                    setFeedback(matchFeedback, 'Confirma la contraseña para continuar.', 'warn');
                } else if (password !== confirmation) {
                    setFeedback(matchFeedback, 'Las contraseñas no coinciden.', 'error');
                } else {
                    matchValid = true;
                    setFeedback(matchFeedback, 'Las contraseñas coinciden.', 'ok');
                }

                submitBtn.disabled = !(strength.valid && matchValid);
            }

            passwordInput.addEventListener('input', validate);
            confirmInput.addEventListener('input', validate);
            validate();
        })();
    </script>
</body>

</html>
