<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Recuperar Contraseña</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>

<body class="sh bg-sh-deep antialiased min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-[360px] sh-fade-in">

        <!-- ── Logo + Label ── -->
        <div class="text-center mb-8">
            <h1 class="font-brand text-5xl text-[var(--sh-text-1)] mb-3">SlideHub</h1>
            <div class="sh-label mt-1">RECUPERAR ACCESO</div>
        </div>

        <!-- ── Auth Card ── -->
        <div class="sh-card p-6">

            <!-- Alerts -->
            <div th:if="${errorMessage}" class="sh-alert sh-alert-error mb-4">
                <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                <span th:text="${errorMessage}">Error</span>
            </div>
            <div th:if="${successMessage}" class="sh-alert sh-alert-success mb-4">
                <i class="fa-solid fa-circle-check mt-0.5"></i>
                <span th:text="${successMessage}">Éxito</span>
            </div>

            <!-- Formulario de recuperación -->
            <p class="text-sm text-[var(--sh-text-3)] mb-4 text-center">
                Ingresa tu correo electrónico registrado y te enviaremos un enlace para restablecer tu contraseña.
            </p>
            <form method="post" th:action="@{/auth/forgot-password}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}">
                <div class="mb-5">
                    <label for="email" class="sh-input-label">Correo Electrónico</label>
                    <input type="email" class="sh-input" id="email" name="email" autocomplete="email"
                        placeholder="tu@correo.com" required autofocus>
                </div>

                <button type="submit" class="sh-btn sh-btn-primary w-full justify-center">
                    <i class="fa-solid fa-envelope"></i>
                    Enviar enlace
                </button>
            </form>

            <div class="mt-4 text-center">
                <a th:href="@{/auth/login}" class="text-[var(--sh-blue)] text-sm hover:underline">
                    <i class="fa-solid fa-arrow-left text-xs mr-1"></i> Volver al login
                </a>
            </div>
        </div>
    </div>
</body>

</html>
