<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SlideHub — Control remoto</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            background: var(--sh-deep);
        }

        /* ═══════════════════════════════════════
           SECCIÓN SUPERIOR — Miniaturas
        ═══════════════════════════════════════ */
        .remote-top {
            flex-shrink: 0;
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 0.75rem 0;
            align-items: flex-end;
        }

        .thumb-col-current {
            flex: 3;
            min-width: 0;
        }

        .thumb-col-next {
            flex: 1.4;
            min-width: 0;
            padding-bottom: 2px;
        }

        .thumb-label {
            font-family: var(--sh-font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--sh-text-3);
            margin-bottom: 0.3rem;
        }

        .thumb-slide {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            border-radius: var(--sh-r-md);
            border: 1px solid var(--sh-border-active);
            background: #000;
            display: block;
        }

        #preview-next {
            opacity: 0.55;
            border-color: var(--sh-border);
            border-radius: var(--sh-r-sm);
        }

        .slide-counter-badge {
            display: inline-block;
            margin-left: 0.4rem;
            font-family: var(--sh-font-mono);
            font-size: 0.65rem;
            color: var(--sh-text-3);
        }

        /* ═══════════════════════════════════════
           SECCIÓN MEDIA — Notas / Demo controls
        ═══════════════════════════════════════ */
        .remote-middle {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 0.75rem;
            -webkit-overflow-scrolling: touch;
        }

        /* Panel de notas */
        #notes-panel {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        #notes-empty {
            text-align: center;
            padding: 1.5rem 0;
            font-family: var(--sh-font-mono);
            font-size: 0.75rem;
            color: var(--sh-text-3);
            display: none;
        }

        #notes-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--sh-text-1);
            line-height: 1.3;
        }

        #notes-points {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin: 0;
            padding: 0;
        }

        #notes-points li {
            font-size: 0.9rem;
            color: var(--sh-text-2);
            line-height: 1.45;
            padding-left: 1rem;
            position: relative;
        }

        #notes-points li::before {
            content: '›';
            position: absolute;
            left: 0;
            color: var(--sh-blue);
            font-weight: 700;
        }

        .notes-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.2rem;
        }

        .notes-time {
            font-family: var(--sh-font-mono);
            font-size: 0.7rem;
            color: var(--sh-text-3);
        }

        .notes-phrase {
            font-family: var(--sh-font-mono);
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 20px;
            background: rgba(88, 166, 255, 0.1);
            color: var(--sh-blue);
            border: 1px solid rgba(88, 166, 255, 0.25);
        }

        #btn-expand {
            margin-top: 0.25rem;
            align-self: flex-start;
            background: var(--sh-elevated);
            border: 1px solid var(--sh-border-active);
            color: var(--sh-blue);
            border-radius: var(--sh-r-md);
            padding: 0.45rem 0.9rem;
            font-family: var(--sh-font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 0.4rem;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-expand.visible {
            display: flex;
        }

        #btn-expand:active {
            background: var(--sh-hover);
            transform: scale(0.97);
        }

        /* Panel de demo (reemplaza notas en modo URL) */
        #demo-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            height: 100%;
            min-height: 120px;
        }

        #demo-panel.visible {
            display: flex;
        }

        .demo-mode-label {
            font-family: var(--sh-font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--sh-blue);
            margin-bottom: 0.25rem;
        }

        .scroll-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid var(--sh-border-active);
            background: var(--sh-elevated);
            color: var(--sh-text-1);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .scroll-btn:active {
            transform: scale(0.93);
            background: var(--sh-hover);
            border-color: var(--sh-blue);
        }

        #btn-return-slide {
            background: rgba(88, 166, 255, 0.12);
            border: 1px solid rgba(88, 166, 255, 0.3);
            color: var(--sh-blue);
            border-radius: var(--sh-r-md);
            padding: 0.45rem 1rem;
            font-family: var(--sh-font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.5rem;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-return-slide:active {
            background: rgba(88, 166, 255, 0.2);
        }

        /* ═══════════════════════════════════════
           SECCIÓN INFERIOR — Navegación
        ═══════════════════════════════════════ */
        .remote-bottom {
            flex-shrink: 0;
            padding: 0.6rem 0.75rem calc(0.6rem + env(safe-area-inset-bottom));
            border-top: 1px solid var(--sh-border);
            display: flex;
            gap: 0.6rem;
            align-items: center;
            background: var(--sh-card);
        }

        .nav-btn {
            flex: 1;
            height: 68px;
            background: var(--sh-elevated);
            border: 1px solid var(--sh-border-active);
            color: var(--sh-text-1);
            border-radius: var(--sh-r-lg);
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background var(--sh-t-fast), border-color var(--sh-t-fast);
        }

        .nav-btn:active {
            background: var(--sh-hover);
            border-color: var(--sh-blue);
            transform: scale(0.96);
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: default;
        }

        .fs-btn {
            flex: 0 0 52px;
            height: 68px;
            background: var(--sh-elevated);
            border: 1px solid var(--sh-border);
            color: var(--sh-text-2);
            border-radius: var(--sh-r-lg);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background var(--sh-t-fast), color var(--sh-t-fast);
        }

        .fs-btn:active {
            background: var(--sh-hover);
            color: var(--sh-blue);
        }

        .side-btn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: var(--sh-r-lg);
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.1rem;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--sh-font-mono);
            font-size: 0.6rem;
        }

        .side-btn i {
            font-size: 1.2rem;
        }

        .side-btn:active {
            transform: scale(0.94);
        }

        #help-btn {
            background: var(--sh-red);
            color: var(--sh-deep);
            display: none;
        }

        #help-btn.visible {
            display: flex;
        }

        #mic-btn {
            background: var(--sh-blue);
            color: var(--sh-deep);
            display: none;
        }

        #mic-btn.visible {
            display: flex;
        }

        #mic-btn.recording {
            background: var(--sh-red);
            animation: sh-pulse-ring 1s ease infinite;
        }

        #btn-demo-fab {
            width: 48px;
            height: 48px;
            background: var(--sh-elevated);
            border: 1px solid var(--sh-border-active);
            color: var(--sh-blue);
            border-radius: 50%;
            font-size: 1.1rem;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-demo-fab.visible {
            display: flex;
        }

        #btn-demo-fab:active {
            background: var(--sh-hover);
            transform: scale(0.94);
        }

        /* ═══════════════════════════════════════
           MODAL DE EXPANSIÓN
        ═══════════════════════════════════════ */
        #expand-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 800;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        #expand-modal-overlay.visible {
            display: flex;
        }

        #expand-modal {
            background: var(--sh-card);
            border: 1px solid var(--sh-border-active);
            border-radius: var(--sh-r-lg) var(--sh-r-lg) 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 75vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1rem 0.7rem;
            border-bottom: 1px solid var(--sh-border);
            flex-shrink: 0;
        }

        .modal-header-title {
            font-family: var(--sh-font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--sh-blue);
        }

        #btn-close-expand {
            background: none;
            border: none;
            color: var(--sh-text-3);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            -webkit-tap-highlight-color: transparent;
        }

        #expand-modal-body {
            overflow-y: auto;
            padding: 1rem;
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        #expand-content {
            font-size: 0.9rem;
            color: var(--sh-text-2);
            line-height: 1.65;
            white-space: pre-wrap;
        }

        #expand-loading {
            display: none;
            text-align: center;
            padding: 2rem;
            font-family: var(--sh-font-mono);
            font-size: 0.75rem;
            color: var(--sh-text-3);
        }

        #expand-loading.visible {
            display: block;
        }

        /* ═══════════════════════════════════════
           OVERLAY DE UNIRSE
        ═══════════════════════════════════════ */
        #join-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        #join-overlay.visible {
            display: flex;
        }

        /* ═══════════════════════════════════════
           BOTTOM SHEET (links rápidos)
        ═══════════════════════════════════════ */
        #sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 250;
            display: none;
        }

        #sheet-overlay.visible {
            display: block;
        }

        #bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--sh-card);
            border-top: 1px solid var(--sh-border-active);
            border-radius: var(--sh-r-lg) var(--sh-r-lg) 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 300;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        #bottom-sheet.open {
            transform: translateY(0);
        }

        .demo-link-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--sh-deep);
            border: 1px solid var(--sh-border);
            border-radius: var(--sh-r-md);
            color: var(--sh-text-1);
            padding: 0.8rem 1rem;
            width: 100%;
            text-align: left;
            cursor: pointer;
            margin-bottom: 0.5rem;
            font-family: var(--sh-font-mono);
            font-size: 0.85rem;
            -webkit-tap-highlight-color: transparent;
        }

        .demo-link-btn:active {
            background: var(--sh-hover);
            border-color: var(--sh-blue);
        }

        .demo-link-desc {
            font-size: 0.7rem;
            color: var(--sh-text-3);
            display: block;
            font-family: var(--sh-font-body);
        }

        /* ═══════════════════════════════════════
           ASSIST CARD & NOTICE
        ═══════════════════════════════════════ */
        #assist-card {
            position: fixed;
            left: 0.75rem;
            right: 0.75rem;
            bottom: 6.5rem;
            background: var(--sh-card);
            border: 1px solid var(--sh-border-active);
            border-radius: var(--sh-r-md);
            padding: 0.75rem;
            z-index: 400;
            display: none;
        }

        #assist-card.visible {
            display: block;
        }

        #assist-card .title {
            font-family: var(--sh-font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--sh-blue);
            margin-bottom: 0.35rem;
        }

        #assist-card .content {
            font-size: 0.85rem;
            line-height: 1.45;
            color: var(--sh-text-2);
            white-space: pre-wrap;
        }

        #notice {
            position: fixed;
            top: 0.75rem;
            left: 0.75rem;
            right: 0.75rem;
            background: var(--sh-card);
            border: 1px solid var(--sh-border-active);
            border-radius: var(--sh-r-md);
            padding: 0.5rem 0.75rem;
            font-family: var(--sh-font-mono);
            font-size: 0.75rem;
            color: var(--sh-text-2);
            z-index: 600;
            display: none;
            text-align: center;
        }

        #notice.visible {
            display: block;
        }

        @keyframes sh-pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.5);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(248, 81, 73, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(248, 81, 73, 0);
            }
        }

        /* ── HOST swap button (solo presentadores autenticados) ── */
        #host-panel-link {
            position: fixed;
            top: 0.7rem;
            right: 0.7rem;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(10px);
            border: 1px solid var(--sh-border-active);
            color: var(--sh-blue);
            border-radius: var(--sh-r-md);
            padding: 0.3rem 0.65rem;
            font-family: var(--sh-font-mono);
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            z-index: 300;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.15s, background 0.15s;
        }

        #host-panel-link:active {
            background: rgba(30, 41, 59, 0.95);
            border-color: var(--sh-blue);
        }
    </style>
</head>

<body class="sh antialiased">

    <!-- HOST-only: acceso rápido a /main-panel (invisible para participantes sin sesión) -->
    <a sec:authorize="hasAnyRole('PRESENTER', 'ADMIN')" id="host-panel-link"
        th:href="${presentationId != null and presentationId != '' ? '/main-panel?presentationId=' + presentationId : '/main-panel'}">
        <i class="fa-solid fa-table-cells-large"></i>
        Panel
    </a>

    <!-- ═══════════════════════ TOP — Miniaturas ═══════════════════════ -->
    <div class="remote-top">
        <div class="thumb-col-current">
            <div class="thumb-label">
                Actual
                <span class="slide-counter-badge" id="slide-counter"></span>
            </div>
            <img id="preview-current" class="thumb-slide" alt="Slide actual">
        </div>
        <div class="thumb-col-next" id="next-col">
            <div class="thumb-label">Siguiente</div>
            <img id="preview-next" class="thumb-slide" alt="Siguiente">
        </div>
    </div>

    <!-- ═══════════════════════ MIDDLE — Notas / Demo ═══════════════════════ -->
    <div class="remote-middle">

        <!-- Panel de notas (modo slides) -->
        <div id="notes-panel">
            <div id="notes-empty">Sin notas para este slide</div>
            <div id="notes-title" style="display:none"></div>
            <ul id="notes-points" style="display:none"></ul>
            <div class="notes-meta" id="notes-meta" style="display:none"></div>
            <button id="btn-expand" type="button" onclick="openExpandModal()">
                <i class="fa-solid fa-magnifying-glass-plus"></i>
                Expandir info
            </button>
        </div>

        <!-- Panel de demo (modo URL) -->
        <div id="demo-panel">
            <div class="demo-mode-label"><i class="fa-solid fa-globe mr-1"></i>MODO DEMO — URL</div>
            <div style="display:flex; gap:1.5rem;">
                <button class="scroll-btn" id="btn-scroll-up" aria-label="Subir">
                    <i class="fa-solid fa-chevron-up"></i>
                </button>
                <button class="scroll-btn" id="btn-scroll-down" aria-label="Bajar">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <button id="btn-return-slide" onclick="returnToSlide()">
                <i class="fa-solid fa-arrow-left"></i>
                Volver a diapositivas
            </button>
        </div>

    </div>

    <!-- ═══════════════════════ BOTTOM — Navegación ═══════════════════════ -->
    <div class="remote-bottom">
        <button class="side-btn" id="help-btn" type="button" onclick="requestHelp()">
            <i class="fa-solid fa-life-ring"></i>
            Ayuda
        </button>
        <button class="nav-btn" id="btn-prev" disabled aria-label="Anterior">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="fs-btn" id="btn-fullscreen" type="button" onclick="toggleFullscreen()"
            aria-label="Pantalla completa">
            <i class="fa-solid fa-expand" id="fs-icon"></i>
        </button>
        <button class="nav-btn" id="btn-next" disabled aria-label="Siguiente">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
        <button class="side-btn" id="mic-btn" type="button" title="Mantén para preguntar">
            <i class="fa-solid fa-microphone"></i>
            Voz
        </button>
        <button class="side-btn" id="btn-demo-fab" onclick="openSheet()" title="Links rápidos"
            th:style="${!hasQuickLinks} ? 'display:none!important' : ''">
            <i class="fa-solid fa-globe"></i>
        </button>
    </div>

    <!-- ═══════════════════════ MODAL EXPANSIÓN ═══════════════════════ -->
    <div id="expand-modal-overlay" onclick="onExpandOverlayClick(event)">
        <div id="expand-modal">
            <div class="modal-header">
                <span class="modal-header-title">
                    <i class="fa-solid fa-magnifying-glass-plus mr-1"></i>
                    INFO EXPANDIDA
                </span>
                <button id="btn-close-expand" onclick="closeExpandModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="expand-modal-body">
                <div id="expand-loading"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>Generando con IA...</div>
                <div id="expand-content"></div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════ JOIN OVERLAY ═══════════════════════ -->
    <div id="join-overlay">
        <div class="sh-card p-5 w-full max-w-[420px]">
            <div class="sh-label mb-3">
                <i class="fa-solid fa-qrcode mr-1"></i>UNIRSE A LA REUNIÓN
            </div>
            <select id="join-participant-select" class="sh-select text-sm mb-3"></select>
            <input id="join-custom-name" type="text" class="sh-input text-sm mb-3" maxlength="120"
                placeholder="Otro nombre (opcional)">
            <button type="button" class="sh-btn sh-btn-blue w-full justify-center" onclick="submitJoin()">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                Unirse
            </button>
        </div>
    </div>

    <!-- ═══════════════════════ ASSIST CARD ═══════════════════════ -->
    <div id="assist-card">
        <div class="title">AI ASSIST</div>
        <div class="content" id="assist-answer-text"></div>
    </div>

    <!-- ═══════════════════════ BOTTOM SHEET ═══════════════════════ -->
    <div id="sheet-overlay" onclick="closeSheet()"></div>
    <div id="bottom-sheet">
        <div class="w-10 h-1 bg-[var(--sh-text-3)] rounded-full mx-auto mt-3 mb-1 opacity-40"></div>
        <div class="text-center py-2 border-b border-[var(--sh-border)] sh-label">
            <i class="fa-solid fa-globe mr-1"></i>LINKS RÁPIDOS
        </div>
        <div class="overflow-y-auto p-3 flex-1" id="sheet-links-container">
            <button th:each="link : ${quickLinks}" th:data-url="${link.url}" class="demo-link-btn"
                onclick="activateDemoLink(this.dataset.url)">
                <i th:if="${link.icon != null}" th:class="${link.icon} + ' fa-fw'"></i>
                <i th:if="${link.icon == null}" class="fa-solid fa-link fa-fw"></i>
                <span>
                    <span th:text="${link.title}">Título</span>
                    <span th:if="${link.description != null}" th:text="${link.description}"
                        class="demo-link-desc"></span>
                </span>
            </button>
            <div th:if="${quickLinks.isEmpty()}" class="text-center py-8 font-mono text-xs text-[var(--sh-text-3)]">
                No hay links de demo configurados.
            </div>
        </div>
    </div>

    <!-- ═══════════════════════ NOTICE ═══════════════════════ -->
    <div id="notice"></div>

    <!-- ═══════════════════════ SCRIPTS ═══════════════════════ -->
    <script th:inline="javascript">
        const POLL_INTERVAL_MS = /*[[${pollIntervalMs}]]*/ 1000;
        const API_SLIDE_URL = '/api/slide';
        const API_DEMO_URL = '/api/demo';

        const query = new URLSearchParams(window.location.search);
        const PRESENTATION_ID = query.get('presentationId') || '';
        let activePresentationId = PRESENTATION_ID;
        const JOIN_TOKEN = query.get('joinToken') || '';
        const STORAGE_KEY = `participant-token:${PRESENTATION_ID}`;
        const DEVICE_STORAGE_KEY = `device-token:remote:${PRESENTATION_ID || 'global'}`;

        let currentSlide = 1;
        let totalSlides = 0;
        let demoMode = 'slides';
        let participantToken = localStorage.getItem(STORAGE_KEY) || '';
        let lastSlideForAssignment = -1;
        let noticeTimeout;
        let mediaRecorder = null;
        let mediaStream = null;
        let audioChunks = [];
        let recording = false;
        let deviceToken = localStorage.getItem(DEVICE_STORAGE_KEY) || '';

        // ── DOM refs ─────────────────────────────────────────────────────────
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const helpBtn = document.getElementById('help-btn');
        const micBtn = document.getElementById('mic-btn');
        const btnDemoFab = document.getElementById('btn-demo-fab');
        const slideCounter = document.getElementById('slide-counter');
        const previewCurrent = document.getElementById('preview-current');
        const previewNext = document.getElementById('preview-next');
        const nextCol = document.getElementById('next-col');
        const notesPanel = document.getElementById('notes-panel');
        const notesEmpty = document.getElementById('notes-empty');
        const notesTitle = document.getElementById('notes-title');
        const notesPoints = document.getElementById('notes-points');
        const notesMeta = document.getElementById('notes-meta');
        const btnExpand = document.getElementById('btn-expand');
        const demoPanel = document.getElementById('demo-panel');
        const joinOverlay = document.getElementById('join-overlay');
        const participantSelect = document.getElementById('join-participant-select');
        const customNameInput = document.getElementById('join-custom-name');
        const notice = document.getElementById('notice');
        const assistCard = document.getElementById('assist-card');
        const assistAnswerText = document.getElementById('assist-answer-text');
        const expandOverlay = document.getElementById('expand-modal-overlay');
        const expandLoading = document.getElementById('expand-loading');
        const expandContent = document.getElementById('expand-content');

        // ── Device heartbeat ─────────────────────────────────────────────────

        function ensureDeviceToken() {
            if (deviceToken) return deviceToken;
            deviceToken = (window.crypto?.randomUUID?.()) ||
                `dev-${Date.now()}-${Math.random().toString(36).slice(2)}`;
            localStorage.setItem(DEVICE_STORAGE_KEY, deviceToken);
            return deviceToken;
        }

        async function sendDeviceHeartbeat(register = false) {
            try {
                await fetch(register ? '/api/devices/register' : '/api/devices/heartbeat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: `remote-${PRESENTATION_ID || 'public'}`,
                        type: 'remote',
                        token: ensureDeviceToken()
                    })
                });
            } catch (_) { }
        }

        // ── Thumbnails ───────────────────────────────────────────────────────

        function slideImageUrl(n) {
            if (!n || n < 1 || n > totalSlides) return '';
            if (activePresentationId) return `/api/presentations/${activePresentationId}/slides/${n}/image`;
            return `/presentation/Slide${n}.PNG`;
        }

        function updateThumbs() {
            slideCounter.textContent = `${currentSlide} / ${totalSlides}`;
            btnPrev.disabled = currentSlide <= 1;
            btnNext.disabled = currentSlide >= totalSlides;

            const curUrl = slideImageUrl(currentSlide);
            if (curUrl && previewCurrent.src !== location.origin + curUrl) {
                previewCurrent.src = curUrl;
            }

            const nextUrl = slideImageUrl(currentSlide + 1);
            if (nextUrl) {
                previewNext.src = nextUrl;
                nextCol.style.display = '';
            } else {
                nextCol.style.display = 'none';
            }
        }

        // ── Notes ────────────────────────────────────────────────────────────

        let lastNoteSlide = -1;

        async function loadNotes(slideNum) {
            if (!PRESENTATION_ID || slideNum === lastNoteSlide) return;
            lastNoteSlide = slideNum;

            try {
                const res = await fetch(`/api/ai/notes/${PRESENTATION_ID}/${slideNum}`);
                if (res.status === 204 || !res.ok) {
                    showNotesEmpty();
                    return;
                }
                const note = await res.json();
                renderNotes(note);
            } catch (_) {
                showNotesEmpty();
            }
        }

        function renderNotes(note) {
            notesEmpty.style.display = 'none';
            notesTitle.textContent = note.title || '';
            notesTitle.style.display = note.title ? '' : 'none';

            notesPoints.innerHTML = '';
            if (note.points && note.points.length > 0) {
                note.points.forEach(p => {
                    const li = document.createElement('li');
                    li.textContent = p;
                    notesPoints.appendChild(li);
                });
                notesPoints.style.display = '';
            } else {
                notesPoints.style.display = 'none';
            }

            notesMeta.innerHTML = '';
            if (note.suggestedTime) {
                const t = document.createElement('span');
                t.className = 'notes-time';
                t.textContent = '⏱ ' + note.suggestedTime;
                notesMeta.appendChild(t);
            }
            (note.keyPhrases || []).forEach(kp => {
                const badge = document.createElement('span');
                badge.className = 'notes-phrase';
                badge.textContent = kp;
                notesMeta.appendChild(badge);
            });
            notesMeta.style.display = notesMeta.children.length > 0 ? '' : 'none';

            btnExpand.classList.toggle('visible', !!(note.title || (note.points && note.points.length > 0)));
        }

        function showNotesEmpty() {
            notesEmpty.style.display = '';
            notesTitle.style.display = 'none';
            notesPoints.style.display = 'none';
            notesMeta.style.display = 'none';
            btnExpand.classList.remove('visible');
        }

        // ── Expand modal ─────────────────────────────────────────────────────

        let expandCache = {};  // cache local por slideNumber

        async function openExpandModal() {
            if (!PRESENTATION_ID) return;
            expandOverlay.classList.add('visible');
            expandContent.textContent = '';

            if (expandCache[currentSlide]) {
                expandLoading.classList.remove('visible');
                expandContent.textContent = expandCache[currentSlide];
                return;
            }

            expandLoading.classList.add('visible');
            try {
                const res = await fetch(
                    `/api/ai/notes/${PRESENTATION_ID}/${currentSlide}/expand`,
                    { method: 'POST' }
                );
                const data = await res.json();
                expandLoading.classList.remove('visible');
                if (res.ok && data.expanded) {
                    expandCache[currentSlide] = data.expanded;
                    expandContent.textContent = data.expanded;
                } else {
                    expandContent.textContent = data.error || 'No se pudo generar la expansión.';
                }
            } catch (_) {
                expandLoading.classList.remove('visible');
                expandContent.textContent = 'Error de red al obtener la expansión.';
            }
        }

        function closeExpandModal() {
            expandOverlay.classList.remove('visible');
        }

        function onExpandOverlayClick(e) {
            if (e.target === expandOverlay) closeExpandModal();
        }

        // ── Demo mode ────────────────────────────────────────────────────────

        function onDemoStateChange(demo) {
            demoMode = demo.mode;
            if (demo.mode === 'url') {
                notesPanel.style.display = 'none';
                demoPanel.classList.add('visible');
            } else {
                demoPanel.classList.remove('visible');
                notesPanel.style.display = '';
            }
        }

        async function scrollDemo(delta) {
            try {
                await fetch(`${API_DEMO_URL}/scroll`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ delta })
                });
                if (navigator.vibrate) navigator.vibrate(20);
            } catch (_) { }
        }

        async function returnToSlide() {
            try {
                await fetch(API_DEMO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'slides' })
                });
                if (navigator.vibrate) navigator.vibrate(60);
            } catch (_) { }
        }

        document.getElementById('btn-scroll-up').addEventListener('click', () => scrollDemo(-300));
        document.getElementById('btn-scroll-down').addEventListener('click', () => scrollDemo(300));

        async function activateDemoLink(url) {
            try {
                await fetch(API_DEMO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'url', url, returnSlide: currentSlide })
                });
                if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
            } catch (_) { }
            closeSheet();
        }

        // ── Polling ──────────────────────────────────────────────────────────

        async function fetchState() {
            try {
                const [slideRes, demoRes] = await Promise.all([
                    fetch(API_SLIDE_URL),
                    fetch(API_DEMO_URL)
                ]);

                if (slideRes.ok) {
                    const data = await slideRes.json();
                    const prevSlide = currentSlide;
                    currentSlide = data.slide;
                    totalSlides = data.totalSlides;
                    if (!PRESENTATION_ID && data.presentationId) {
                        activePresentationId = data.presentationId;
                    }
                    updateThumbs();

                    if (prevSlide !== currentSlide) {
                        lastNoteSlide = -1;  // forzar recarga de notas
                        if (demoMode === 'slides') {
                            loadNotes(currentSlide);
                        }
                        await handleSlideChangeHaptic();
                    }
                }

                if (demoRes.ok) {
                    const demo = await demoRes.json();
                    onDemoStateChange(demo);
                }

                if (participantToken) {
                    await pollHapticEvent();
                }
            } catch (_) { }
        }

        // ── Haptic ───────────────────────────────────────────────────────────

        /**
         * Patrones de vibración:
         *  single  → 1 pulso  (slide nuevo, todos)
         *  double  → 2 pulsos (slide asignado a este participante)
         *  triple  → 3 pulsos (alguien presionó ayuda)
         */
        function vibrate(pattern) {
            if (!navigator.vibrate) return;
            const map = {
                single: [200],
                double: [200, 120, 200],
                triple: [200, 120, 200, 120, 200]
            };
            navigator.vibrate(map[pattern] || [200]);
        }

        async function handleSlideChangeHaptic() {
            if (!participantToken || !PRESENTATION_ID || !JOIN_TOKEN
                || currentSlide === lastSlideForAssignment) {
                vibrate('single');
                return;
            }
            lastSlideForAssignment = currentSlide;
            try {
                const url = `/api/presentations/${PRESENTATION_ID}/meeting/assignment-check`
                    + `?joinToken=${encodeURIComponent(JOIN_TOKEN)}`
                    + `&participantToken=${encodeURIComponent(participantToken)}`
                    + `&slideNumber=${currentSlide}`;
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    if (data.vibrate && data.pattern === 'double') {
                        vibrate('double');
                        showNotice(data.message || 'Tu slide está activa');
                        return;
                    }
                }
            } catch (_) { }
            vibrate('single');
        }

        async function pollHapticEvent() {
            try {
                const res = await fetch(
                    `/api/haptics/events/next?participantToken=${encodeURIComponent(participantToken)}`
                );
                if (res.status === 204 || !res.ok) return;
                const event = await res.json();
                const pattern = event.pattern || 'single';
                vibrate(pattern);
                showNotice(event.message || (pattern === 'triple' ? '¡Solicitud de ayuda!' : 'Notificación'));
            } catch (_) { }
        }

        // ── Navigation ────────────────────────────────────────────────────────

        async function navigate(delta) {
            const target = currentSlide + delta;
            if (target < 1 || target > totalSlides) return;
            try {
                await fetch(API_SLIDE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slide: target, totalSlides })
                });
                currentSlide = target;
                updateThumbs();
                if (navigator.vibrate) navigator.vibrate(30);
            } catch (_) { }
        }

        btnPrev.addEventListener('click', () => navigate(-1));
        btnNext.addEventListener('click', () => navigate(1));

        // Swipe horizontal para navegar
        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 60 && demoMode === 'slides') navigate(diff > 0 ? 1 : -1);
        }, { passive: true });

        // ── Join ─────────────────────────────────────────────────────────────

        async function loadJoinOptions() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || participantToken) return;
            try {
                const res = await fetch(
                    `/api/presentations/${PRESENTATION_ID}/meeting/join-options?joinToken=${encodeURIComponent(JOIN_TOKEN)}`
                );
                if (!res.ok) { showNotice('No se pudo validar la sesión'); return; }
                const data = await res.json();
                const participants = data.participants || [];
                participantSelect.innerHTML =
                    '<option value="">Selecciona tu nombre</option>' +
                    participants.map(p => `<option value="${p.id}">${p.displayName}</option>`).join('');
                joinOverlay.classList.add('visible');
            } catch (_) { showNotice('Error cargando participantes'); }
        }

        async function submitJoin() {
            const payload = {
                joinToken: JOIN_TOKEN,
                participantId: participantSelect.value || null,
                customName: customNameInput.value.trim() || null
            };
            if (!payload.participantId && !payload.customName) {
                showNotice('Selecciona un nombre o escribe uno');
                return;
            }
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) { showNotice('No se pudo unir a la reunión'); return; }
                const data = await res.json();
                participantToken = data.participantToken || '';
                if (participantToken) {
                    localStorage.setItem(STORAGE_KEY, participantToken);
                    helpBtn.classList.add('visible');
                    micBtn.classList.add('visible');
                    joinOverlay.classList.remove('visible');
                    showNotice(`Conectado como ${data.displayName || 'participante'}`);
                }
            } catch (_) { showNotice('Error de red al unirse'); }
        }

        // ── Help ─────────────────────────────────────────────────────────────

        async function requestHelp() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || !participantToken) {
                showNotice('Únete primero a la reunión');
                return;
            }
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/help`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ joinToken: JOIN_TOKEN, participantToken })
                });
                if (!res.ok) { showNotice('No se pudo enviar la solicitud'); return; }
                vibrate('single');
                showNotice('Solicitud de ayuda enviada ✋');
            } catch (_) { showNotice('Error al enviar solicitud'); }
        }

        // ── Audio assist ─────────────────────────────────────────────────────

        async function startRecording() {
            if (recording || !participantToken || !JOIN_TOKEN || !PRESENTATION_ID) return;
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    await uploadAssistAudio(new Blob(audioChunks, { type: 'audio/webm' }));
                    mediaStream?.getTracks().forEach(t => t.stop());
                    mediaStream = mediaRecorder = null;
                    audioChunks = [];
                };
                mediaRecorder.start();
                recording = true;
                micBtn.classList.add('recording');
                showNotice('Grabando...');
            } catch (_) { showNotice('No se pudo activar el micrófono'); }
        }

        function stopRecording() {
            if (!recording || !mediaRecorder) return;
            recording = false;
            micBtn.classList.remove('recording');
            mediaRecorder.stop();
        }

        async function uploadAssistAudio(blob) {
            if (!blob?.size) return;
            const formData = new FormData();
            formData.append('joinToken', JOIN_TOKEN);
            formData.append('participantToken', participantToken);
            formData.append('slideNumber', String(currentSlide || 1));
            formData.append('slideContext', `Slide ${currentSlide || 1}`);
            formData.append('audio', blob, 'question.webm');
            try {
                showNotice('Procesando con IA...');
                const res = await fetch(
                    `/api/presentations/${PRESENTATION_ID}/meeting/assist/audio`,
                    { method: 'POST', body: formData }
                );
                if (!res.ok) { showNotice('No se pudo procesar la pregunta'); return; }
                const data = await res.json();
                if (!data.success) { showNotice('Error IA: ' + (data.errorMessage || '')); return; }
                showAssistCard(`P: ${data.transcription || ''}\n\nR: ${data.answer || ''}`);
            } catch (_) { showNotice('Error de red'); }
        }

        function showAssistCard(text) {
            assistAnswerText.textContent = text;
            assistCard.classList.add('visible');
            setTimeout(() => assistCard.classList.remove('visible'), 14000);
        }

        // ── Notice ───────────────────────────────────────────────────────────

        function showNotice(msg) {
            if (!msg) return;
            notice.textContent = msg;
            notice.classList.add('visible');
            clearTimeout(noticeTimeout);
            noticeTimeout = setTimeout(() => notice.classList.remove('visible'), 2600);
        }

        // ── Bottom sheet ──────────────────────────────────────────────────────

        function openSheet() {
            document.getElementById('bottom-sheet').classList.add('open');
            document.getElementById('sheet-overlay').classList.add('visible');
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.remove('open');
            document.getElementById('sheet-overlay').classList.remove('visible');
        }

        // ── Mic events ───────────────────────────────────────────────────────

        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
        micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });
        micBtn.addEventListener('touchcancel', stopRecording);

        // ── Init ─────────────────────────────────────────────────────────────

        // ── Fullscreen helpers ──────────────────────────────────────────────
        function _isFullscreen() {
            return !!(
                document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.mozFullScreenElement ||
                document.msFullscreenElement
            );
        }

        function _requestFullscreen(elem) {
            if (elem.requestFullscreen) return elem.requestFullscreen();
            if (elem.webkitRequestFullscreen) return elem.webkitRequestFullscreen();
            if (elem.mozRequestFullScreen) return elem.mozRequestFullScreen();
            if (elem.msRequestFullscreen) return elem.msRequestFullscreen();
            return Promise.resolve();
        }

        function _exitFullscreen() {
            if (document.exitFullscreen) return document.exitFullscreen();
            if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
            if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
            if (document.msExitFullscreen) return document.msExitFullscreen();
            return Promise.resolve();
        }

        function updateFsIcon() {
            const icon = document.getElementById('fs-icon');
            if (!icon) return;
            if (_isFullscreen()) {
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-compress');
            } else {
                icon.classList.remove('fa-compress');
                icon.classList.add('fa-expand');
            }
        }

        async function toggleFullscreen() {
            try {
                if (!_isFullscreen()) {
                    await _requestFullscreen(document.documentElement);
                } else {
                    await _exitFullscreen();
                }
            } catch (e) {
                // silently ignore errors (some browsers block programmatic fullscreen)
            }
            updateFsIcon();
        }

        // keep icon in sync when user toggles fullscreen via browser UI or ESC
        document.addEventListener('fullscreenchange', updateFsIcon);
        document.addEventListener('webkitfullscreenchange', updateFsIcon);
        document.addEventListener('mozfullscreenchange', updateFsIcon);
        document.addEventListener('MSFullscreenChange', updateFsIcon);


        if (participantToken) {
            helpBtn.classList.add('visible');
            micBtn.classList.add('visible');
        }

        if (/*[[${hasQuickLinks}]]*/ false) {
            btnDemoFab.classList.add('visible');
        }

        sendDeviceHeartbeat(true);
        fetchState();
        loadJoinOptions();
        if (PRESENTATION_ID) loadNotes(1);
        setInterval(fetchState, POLL_INTERVAL_MS);
        setInterval(() => sendDeviceHeartbeat(false), 30000);
    </script>
</body>
