<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Unirse a presentación</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        input[type=text].join-code-input {
            font-size: 2rem;
            letter-spacing: 0.35em;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }
        input[type=text].join-code-input::placeholder {
            letter-spacing: 0.2em;
            font-size: 1.5rem;
        }
    </style>
</head>

<body class="sh bg-sh-deep antialiased min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-[380px] sh-fade-in">

        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="font-brand text-5xl text-[var(--sh-text-1)] mb-3">SlideHub</h1>
            <div class="sh-label mt-1">MODO ESPECTADOR</div>
        </div>

        <!-- Card -->
        <div class="sh-card p-6">

            <!-- Error alert -->
            <div th:if="${error}" class="sh-alert sh-alert-error mb-5">
                <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                <span th:text="${error}">Error</span>
            </div>

            <p class="text-sm text-[var(--sh-text-2)] mb-5 text-center">
                Ingresa el código de 5 dígitos que te compartió el presentador.
            </p>

            <form method="post" th:action="@{/join}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}">

                <div class="mb-5">
                    <label for="code" class="sh-input-label">Código de acceso</label>
                    <input
                        type="text"
                        id="code"
                        name="code"
                        class="sh-input join-code-input"
                        maxlength="5"
                        pattern="\d{5}"
                        inputmode="numeric"
                        placeholder="00000"
                        autocomplete="off"
                        autofocus
                        th:value="${code}"
                        required>
                </div>

                <button type="submit" class="sh-btn sh-btn-primary w-full justify-center">
                    <i class="fa-solid fa-eye"></i>
                    Ver presentación
                </button>
            </form>
        </div>

        <!-- Back link -->
        <div class="text-center mt-5">
            <a href="/showcase" class="font-mono text-xs text-[var(--sh-text-3)] hover:text-[var(--sh-text-2)] transition-colors">
                ← Volver al inicio
            </a>
        </div>
    </div>

    <script>
        // Solo acepta dígitos en el campo de código
        document.getElementById('code').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 5);
        });
    </script>

</body>

</html>
