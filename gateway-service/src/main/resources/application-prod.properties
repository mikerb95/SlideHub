# ── Producción: Gateway Config Server ─────────────────────────────────────────
# En prod, spring.profiles.active=prod (set por Dockerfile).
# Necesitamos incluir el perfil 'native' para que el Config Server NO exija un
# repositorio git, sino que lea desde el classpath.
spring.profiles.include=native
spring.cloud.config.server.native.search-locations=classpath:/config-repo
