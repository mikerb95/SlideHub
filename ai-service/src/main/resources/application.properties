spring.application.name=ai-service
server.port=${PORT:8083}

# Forzar Spring MVC (no reactive) aunque webflux esté en el classpath para WebClient
spring.main.web-application-type=servlet

# MongoDB
spring.mongodb.uri=${MONGODB_URI}

# Gemini API
slidehub.ai.gemini.api-key=${GEMINI_API_KEY:placeholder}
slidehub.ai.gemini.base-url=https://generativelanguage.googleapis.com

# Groq API
slidehub.ai.groq.api-key=${GROQ_API_KEY:placeholder}
slidehub.ai.groq.base-url=https://api.groq.com
slidehub.ai.groq.model=${GROQ_MODEL:llama3-8b-8192}

# GitHub API (input URL, extracción backend)
slidehub.github.api-base-url=${GITHUB_API_BASE_URL:https://api.github.com}
slidehub.github.token=${GITHUB_TOKEN:}
slidehub.github.max-files-for-context=${GITHUB_MAX_FILES_FOR_CONTEXT:120}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mongodb.enabled=false
