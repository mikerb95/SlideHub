<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Status — SlideHub</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        @media (max-width: 640px) {
            .status-nav {
                flex-wrap: wrap;
                gap: 0.5rem;
                justify-content: flex-start;
            }

            .status-nav-actions {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body class="sh bg-sh-deep antialiased min-h-screen">
    <nav class="sh-nav" style="position: sticky;">
        <div class="sh-nav-inner status-nav">
            <div class="flex items-center gap-2 sm:gap-3">
                <span class="font-brand text-base tracking-tight">System_Status</span>
                <div class="sh-status ml-1 hidden sm:inline-flex">
                    <i class="fa-solid fa-wave-square text-xs" style="color: var(--sh-blue);"></i>
                </div>
            </div>
            <div class="status-nav-actions flex items-center gap-2">
                <a href="/presenter" class="sh-btn sh-btn-ghost text-xs">
                    <i class="fa-solid fa-chalkboard"></i>
                    <span class="hidden sm:inline">Presenter</span>
                </a>
                <a href="/main-panel" class="sh-btn sh-btn-ghost text-xs">
                    <i class="fa-solid fa-table-cells-large"></i>
                    <span class="hidden sm:inline">Panel</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-[1100px] mx-auto px-4 py-6">
        <div class="sh-card p-5">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
                <div class="sh-label">
                    <i class="fa-solid fa-heart-pulse mr-1"></i>REALTIME_CONNECTIVITY
                </div>
                <div class="text-xs font-mono text-[var(--sh-text-3)]">
                    Poll: <span id="poll-interval">--</span>ms · Last update: <span id="last-updated">--</span>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm" style="border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--sh-border);">
                            <th class="text-left py-2 text-xs font-mono text-[var(--sh-text-3)]">TARGET</th>
                            <th class="text-left py-2 text-xs font-mono text-[var(--sh-text-3)]">STATUS</th>
                            <th class="text-left py-2 text-xs font-mono text-[var(--sh-text-3)]">LATENCY_MS</th>
                            <th class="text-left py-2 text-xs font-mono text-[var(--sh-text-3)]">LAST_CHECKED</th>
                            <th class="text-left py-2 text-xs font-mono text-[var(--sh-text-3)]">DETAIL</th>
                        </tr>
                    </thead>
                    <tbody id="checks-body">
                        <tr>
                            <td colspan="5" class="py-4 text-[var(--sh-text-3)] font-mono text-xs">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="status-error" class="mt-3 text-xs font-mono hidden" style="color: var(--sh-red);"></div>
        </div>
    </main>

    <script th:inline="javascript">
        window.statusConfig = {
            pollIntervalMs: /*[[${pollIntervalMs}]]*/ 2000
        };
    </script>
    <script src="/js/status-poll.js"></script>
</body>

</html>
