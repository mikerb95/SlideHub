<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Remote</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        body {
            touch-action: pan-y;
            user-select: none;
            overflow: hidden;
        }

        /* ── Nav Buttons (large touch targets) ── */
        .remote-btn {
            background: var(--sh-card);
            border: 1px solid var(--sh-border-active);
            color: var(--sh-text-1);
            width: 76px;
            height: 76px;
            border-radius: var(--sh-r-lg);
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--sh-t-fast), border-color var(--sh-t-fast);
            -webkit-tap-highlight-color: transparent;
        }
        .remote-btn:active {
            background: var(--sh-hover);
            border-color: var(--sh-blue);
            transform: scale(0.95);
        }
        .remote-btn:disabled {
            opacity: 0.25;
            cursor: default;
        }

        /* ── FABs ── */
        .fab {
            position: fixed;
            border: none;
            border-radius: var(--sh-r-lg);
            padding: 0.7rem 1rem;
            font-family: var(--sh-font-mono);
            font-size: 0.8rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 0.4rem;
            z-index: 210;
            box-shadow: var(--sh-shadow-md);
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        .fab:active { transform: scale(0.97); }
        .fab.visible { display: flex; }

        #help-btn {
            bottom: 2rem; left: 1.5rem;
            background: var(--sh-red);
            color: var(--sh-deep);
        }
        #mic-btn {
            bottom: 2rem; left: 8.5rem;
            background: var(--sh-blue);
            color: var(--sh-deep);
        }
        #mic-btn.recording {
            background: var(--sh-red);
            animation: sh-pulse-ring 1s ease infinite;
        }

        /* ── Demo FAB ── */
        #btn-demo-fab {
            position: fixed;
            bottom: 2rem; right: 1.5rem;
            background: var(--sh-elevated);
            border: 1px solid var(--sh-border-active);
            color: var(--sh-blue);
            border-radius: 50%;
            width: 56px; height: 56px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: var(--sh-shadow-md);
            -webkit-tap-highlight-color: transparent;
        }
        #btn-demo-fab:active { transform: scale(0.95); }

        /* ── Return button ── */
        #btn-return-slide {
            position: fixed;
            top: 1rem; left: 50%;
            transform: translateX(-50%);
            background: var(--sh-blue);
            color: var(--sh-deep);
            border: none;
            border-radius: var(--sh-r-md);
            padding: 0.5rem 1rem;
            font-family: var(--sh-font-mono);
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            z-index: 200;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-return-slide.visible { display: flex; }
        #btn-return-slide:active {
            transform: translateX(-50%) scale(0.97);
        }

        /* ── Assist card ── */
        #assist-card {
            position: fixed;
            left: 0.8rem; right: 0.8rem;
            bottom: 5.8rem;
            background: var(--sh-card);
            border: 1px solid var(--sh-border-active);
            border-radius: var(--sh-r-md);
            padding: 0.75rem;
            z-index: 500;
            display: none;
        }
        #assist-card.visible { display: block; }
        #assist-card .title {
            font-family: var(--sh-font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--sh-blue);
            margin-bottom: 0.35rem;
        }
        #assist-card .content {
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--sh-text-2);
            white-space: pre-wrap;
        }

        /* ── Notice toast ── */
        #notice {
            position: fixed;
            top: 1rem; right: 1rem;
            background: var(--sh-card);
            border: 1px solid var(--sh-border-active);
            border-radius: var(--sh-r-md);
            padding: 0.5rem 0.75rem;
            font-family: var(--sh-font-mono);
            font-size: 0.75rem;
            color: var(--sh-text-2);
            z-index: 600;
            display: none;
            max-width: 70vw;
        }
        #notice.visible { display: block; }

        /* ── Join overlay ── */
        #join-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        #join-overlay.visible { display: flex; }

        /* ── Bottom sheet ── */
        #sheet-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 250;
            display: none;
        }
        #sheet-overlay.visible { display: block; }

        #bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--sh-card);
            border-top: 1px solid var(--sh-border-active);
            border-radius: var(--sh-r-lg) var(--sh-r-lg) 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 300;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }
        #bottom-sheet.open { transform: translateY(0); }

        .demo-link-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--sh-deep);
            border: 1px solid var(--sh-border);
            border-radius: var(--sh-r-md);
            color: var(--sh-text-1);
            padding: 0.8rem 1rem;
            width: 100%;
            text-align: left;
            cursor: pointer;
            margin-bottom: 0.5rem;
            font-family: var(--sh-font-mono);
            font-size: 0.85rem;
            -webkit-tap-highlight-color: transparent;
            transition: background var(--sh-t-fast), border-color var(--sh-t-fast);
        }
        .demo-link-btn:active {
            background: var(--sh-hover);
            border-color: var(--sh-blue);
        }
        .demo-link-desc {
            font-size: 0.7rem;
            color: var(--sh-text-3);
            display: block;
            font-family: var(--sh-font-body);
        }

        @keyframes sh-pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(248,81,73,0.5); }
            70%  { box-shadow: 0 0 0 10px rgba(248,81,73,0); }
            100% { box-shadow: 0 0 0 0 rgba(248,81,73,0); }
        }

        @media (max-width: 640px) {
            .remote-btn {
                width: 68px;
                height: 68px;
                font-size: 1.55rem;
            }

            #help-btn {
                left: 1rem;
                bottom: 1rem;
                padding: 0.62rem 0.85rem;
            }

            #mic-btn {
                left: auto;
                right: 4.8rem;
                bottom: 1rem;
                padding: 0.62rem 0.85rem;
            }

            #btn-demo-fab {
                right: 1rem;
                bottom: 1rem;
            }

            #assist-card {
                left: 0.6rem;
                right: 0.6rem;
                bottom: 4.9rem;
            }

            #notice {
                right: 0.6rem;
                left: 0.6rem;
                max-width: none;
            }
        }
    </style>
</head>

<body class="sh bg-sh-deep antialiased h-screen flex flex-col items-center justify-center">

    <!-- Return to slide (visible in URL mode) -->
    <button id="btn-return-slide" onclick="returnToSlide()">
        <i class="fa-solid fa-arrow-left"></i>
        <span id="return-label">Return_Slide</span>
    </button>

    <!-- Slide indicator -->
    <div id="slide-indicator" class="font-mono text-lg text-[var(--sh-text-3)] mb-8">
        Slide &mdash; / &mdash;
    </div>

    <!-- Navigation controls -->
    <div class="flex gap-12 items-center">
        <button class="remote-btn" id="btn-prev" disabled aria-label="Previous">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="remote-btn" id="btn-next" disabled aria-label="Next">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <!-- Swipe hint -->
    <div class="mt-10 font-mono text-xs text-[var(--sh-text-3)] opacity-50">
        &larr; swipe &rarr;
    </div>

    <!-- Help FAB -->
    <button id="help-btn" class="fab" type="button" onclick="requestHelp()">
        <i class="fa-solid fa-life-ring"></i>
        Help
    </button>

    <!-- Mic FAB -->
    <button id="mic-btn" class="fab" type="button" title="Hold to ask">
        <i class="fa-solid fa-microphone"></i>
        Mic
    </button>

    <!-- Assist card -->
    <div id="assist-card">
        <div class="title">AI_ASSIST</div>
        <div class="content" id="assist-answer-text"></div>
    </div>

    <!-- Demo FAB -->
    <button id="btn-demo-fab" th:style="${!hasQuickLinks} ? 'display:none' : ''"
            onclick="openSheet()" title="Demos">
        <i class="fa-solid fa-globe"></i>
    </button>

    <!-- Sheet overlay -->
    <div id="sheet-overlay" onclick="closeSheet()"></div>

    <!-- Bottom Sheet -->
    <div id="bottom-sheet">
        <div class="w-10 h-1 bg-[var(--sh-text-3)] rounded-full mx-auto mt-3 mb-1 opacity-40"></div>
        <div class="text-center py-2 border-b border-[var(--sh-border)] sh-label">
            <i class="fa-solid fa-globe mr-1"></i>QUICK_LINKS
        </div>
        <div class="overflow-y-auto p-3 flex-1" id="sheet-links-container">
            <button th:each="link : ${quickLinks}" th:data-url="${link.url}" class="demo-link-btn"
                    onclick="activateDemoLink(this.dataset.url)">
                <i th:if="${link.icon != null}" th:class="${link.icon} + ' fa-fw'"></i>
                <i th:if="${link.icon == null}" class="fa-solid fa-link fa-fw"></i>
                <span>
                    <span th:text="${link.title}">Title</span>
                    <span th:if="${link.description != null}" th:text="${link.description}"
                          class="demo-link-desc"></span>
                </span>
            </button>
            <div th:if="${quickLinks.isEmpty()}"
                 class="text-center py-8 font-mono text-xs text-[var(--sh-text-3)]">
                No demo links configured.
            </div>
        </div>
    </div>

    <!-- Join overlay -->
    <div id="join-overlay">
        <div class="sh-card p-5 w-full max-w-[420px]">
            <div class="sh-label mb-3">
                <i class="fa-solid fa-qrcode mr-1"></i>JOIN_MEETING
            </div>
            <select id="join-participant-select" class="sh-select text-sm mb-3"></select>
            <input id="join-custom-name" type="text" class="sh-input text-sm mb-3" maxlength="120"
                   placeholder="Other name (optional)">
            <button type="button" class="sh-btn sh-btn-blue w-full justify-center" onclick="submitJoin()">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                Join
            </button>
        </div>
    </div>

    <!-- Notice toast -->
    <div id="notice"></div>

    <!-- ═══ Scripts ═══ -->
    <script th:inline="javascript">
        const POLL_INTERVAL_MS = /*[[${pollIntervalMs}]]*/ 1000;
        const API_SLIDE_URL = '/api/slide';
        const API_DEMO_URL = '/api/demo';

        const query = new URLSearchParams(window.location.search);
        const PRESENTATION_ID = query.get('presentationId') || '';
        const JOIN_TOKEN = query.get('joinToken') || '';
        const STORAGE_KEY = `participant-token:${PRESENTATION_ID}`;

        let currentSlide = 1;
        let totalSlides = 0;
        let demoMode = 'slides';
        let returnSlide = null;
        let participantToken = localStorage.getItem(STORAGE_KEY) || '';
        let lastSlideForAssignment = -1;
        let noticeTimeout;
        let mediaRecorder = null;
        let mediaStream = null;
        let audioChunks = [];
        let recording = false;

        const indicator = document.getElementById('slide-indicator');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnReturn = document.getElementById('btn-return-slide');
        const returnLabel = document.getElementById('return-label');
        const joinOverlay = document.getElementById('join-overlay');
        const participantSelect = document.getElementById('join-participant-select');
        const customNameInput = document.getElementById('join-custom-name');
        const helpBtn = document.getElementById('help-btn');
        const micBtn = document.getElementById('mic-btn');
        const notice = document.getElementById('notice');
        const assistCard = document.getElementById('assist-card');
        const assistAnswerText = document.getElementById('assist-answer-text');

        // ── Slide state ───────────────────────────────────────────────────────

        function updateUI() {
            indicator.textContent = `Slide ${currentSlide} / ${totalSlides}`;
            btnPrev.disabled = currentSlide <= 1;
            btnNext.disabled = currentSlide >= totalSlides;
        }

        async function fetchState() {
            try {
                const [slideRes, demoRes] = await Promise.all([
                    fetch(API_SLIDE_URL),
                    fetch(API_DEMO_URL)
                ]);
                if (slideRes.ok) {
                    const data = await slideRes.json();
                    const previousSlide = currentSlide;
                    currentSlide = data.slide;
                    totalSlides = data.totalSlides;
                    updateUI();
                    if (participantToken && previousSlide !== currentSlide) {
                        await checkSlideAssignment();
                    }
                }
                if (demoRes.ok) {
                    const demo = await demoRes.json();
                    onDemoStateChange(demo);
                }
                if (participantToken) {
                    await pollHapticEvent();
                }
            } catch (_) { }
        }

        function onDemoStateChange(demo) {
            demoMode = demo.mode;
            returnSlide = demo.returnSlide ?? null;
            if (demo.mode === 'url') {
                const label = returnSlide ? `Return_Slide_${returnSlide}` : 'Return_Slides';
                returnLabel.textContent = label;
                btnReturn.classList.add('visible');
            } else {
                btnReturn.classList.remove('visible');
            }
        }

        // ── Navigation ────────────────────────────────────────────────────────

        async function navigate(delta) {
            const target = currentSlide + delta;
            if (target < 1 || target > totalSlides) return;
            try {
                await fetch(API_SLIDE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slide: target, totalSlides })
                });
                currentSlide = target;
                updateUI();
                if (navigator.vibrate) navigator.vibrate(30);
            } catch (_) { }
        }

        btnPrev.addEventListener('click', () => navigate(-1));
        btnNext.addEventListener('click', () => navigate(1));

        // Swipe support (HU-004)
        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
        }, { passive: true });

        // ── Demo controls ─────────────────────────────────────────────────────

        async function activateDemoLink(url) {
            try {
                await fetch(API_DEMO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'url', url, returnSlide: currentSlide })
                });
                if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
            } catch (_) { }
            closeSheet();
        }

        async function checkSlideAssignment() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || !participantToken || currentSlide === lastSlideForAssignment) {
                return;
            }
            lastSlideForAssignment = currentSlide;
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/assignment-check?joinToken=${encodeURIComponent(JOIN_TOKEN)}&participantToken=${encodeURIComponent(participantToken)}&slideNumber=${currentSlide}`);
                if (!res.ok) {
                    return;
                }
                const data = await res.json();
                if (data.vibrate) {
                    triggerHaptic(data.pattern || 'single', data.message || 'Your slide is active');
                }
            } catch (_) { }
        }

        async function pollHapticEvent() {
            try {
                const res = await fetch(`/api/haptics/events/next?participantToken=${encodeURIComponent(participantToken)}`);
                if (res.status === 204 || !res.ok) {
                    return;
                }
                const event = await res.json();
                triggerHaptic(event.pattern || 'single', event.message || 'Notification');
            } catch (_) { }
        }

        function triggerHaptic(pattern, message) {
            const sequence = pattern === 'triple' ? [90, 130, 90, 130, 90] : [110];
            if (navigator.vibrate) {
                navigator.vibrate(sequence);
            }
            showNotice(message || (pattern === 'triple' ? 'Help request' : 'Assigned turn'));
            if (message && message.startsWith('IA para')) {
                showAssistCard(message);
            }
        }

        function showNotice(message) {
            if (!message) {
                return;
            }
            notice.textContent = message;
            notice.classList.add('visible');
            clearTimeout(noticeTimeout);
            noticeTimeout = setTimeout(() => notice.classList.remove('visible'), 2400);
        }

        async function loadJoinOptions() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || participantToken) {
                return;
            }
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/join-options?joinToken=${encodeURIComponent(JOIN_TOKEN)}`);
                if (!res.ok) {
                    showNotice('Could not validate meeting session');
                    return;
                }
                const data = await res.json();
                const participants = data.participants || [];
                participantSelect.innerHTML = '<option value="">Select your name</option>' +
                    participants.map(p => `<option value="${p.id}">${p.displayName}</option>`).join('');
                joinOverlay.classList.add('visible');
            } catch (_) {
                showNotice('Error loading meeting participants');
            }
        }

        async function submitJoin() {
            const payload = {
                joinToken: JOIN_TOKEN,
                participantId: participantSelect.value || null,
                customName: customNameInput.value || null
            };

            if (!payload.participantId && !payload.customName) {
                showNotice('Select a name or type one');
                return;
            }

            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    showNotice('Could not join meeting');
                    return;
                }
                const data = await res.json();
                participantToken = data.participantToken || '';
                if (participantToken) {
                    localStorage.setItem(STORAGE_KEY, participantToken);
                    helpBtn.classList.add('visible');
                    micBtn.classList.add('visible');
                    joinOverlay.classList.remove('visible');
                    showNotice(`Connected as ${data.displayName || 'participant'}`);
                }
            } catch (_) {
                showNotice('Network error joining meeting');
            }
        }

        async function requestHelp() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || !participantToken) {
                showNotice('Join the meeting first');
                return;
            }
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/help`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ joinToken: JOIN_TOKEN, participantToken })
                });
                if (!res.ok) {
                    showNotice('Could not send help request');
                    return;
                }
                if (navigator.vibrate) navigator.vibrate([30, 40, 30]);
                showNotice('Help request sent');
            } catch (_) {
                showNotice('Error sending help request');
            }
        }

        function showAssistCard(text) {
            assistAnswerText.textContent = text;
            assistCard.classList.add('visible');
            setTimeout(() => assistCard.classList.remove('visible'), 14000);
        }

        async function startRecording() {
            if (recording || !participantToken || !JOIN_TOKEN || !PRESENTATION_ID) {
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = event => {
                    if (event.data && event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    await uploadAssistAudio(blob);
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                    }
                    mediaStream = null;
                    mediaRecorder = null;
                    audioChunks = [];
                };
                mediaRecorder.start();
                recording = true;
                micBtn.classList.add('recording');
                showNotice('Recording question...');
            } catch (_) {
                showNotice('Could not activate microphone');
            }
        }

        function stopRecording() {
            if (!recording || !mediaRecorder) {
                return;
            }
            recording = false;
            micBtn.classList.remove('recording');
            mediaRecorder.stop();
        }

        async function uploadAssistAudio(blob) {
            if (!blob || blob.size === 0) {
                return;
            }
            const formData = new FormData();
            formData.append('joinToken', JOIN_TOKEN);
            formData.append('participantToken', participantToken);
            formData.append('slideNumber', String(currentSlide || 1));
            formData.append('slideContext', `Slide ${currentSlide || 1}`);
            formData.append('audio', blob, 'question.webm');

            try {
                showNotice('Processing with AI...');
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/assist/audio`, {
                    method: 'POST',
                    body: formData
                });
                if (!res.ok) {
                    showNotice('Could not process question');
                    return;
                }
                const data = await res.json();
                if (!data.success) {
                    showNotice('AI error: ' + (data.errorMessage || 'no details'));
                    return;
                }
                const answer = data.answer || 'No answer';
                const transcription = data.transcription || '';
                showAssistCard(`Q: ${transcription}\n\nA: ${answer}`);
            } catch (_) {
                showNotice('Network error sending audio');
            }
        }

        async function returnToSlide() {
            try {
                await fetch(API_DEMO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'slides' })
                });
                if (navigator.vibrate) navigator.vibrate(60);
                btnReturn.classList.remove('visible');
            } catch (_) { }
        }

        // ── Bottom sheet ──────────────────────────────────────────────────────

        function openSheet() {
            document.getElementById('bottom-sheet').classList.add('open');
            document.getElementById('sheet-overlay').classList.add('visible');
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.remove('open');
            document.getElementById('sheet-overlay').classList.remove('visible');
        }

        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('touchstart', (event) => {
            event.preventDefault();
            startRecording();
        }, { passive: false });
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
        micBtn.addEventListener('touchend', (event) => {
            event.preventDefault();
            stopRecording();
        });
        micBtn.addEventListener('touchcancel', stopRecording);

        // Init
        if (participantToken) {
            helpBtn.classList.add('visible');
            micBtn.classList.add('visible');
        }
        fetchState();
        loadJoinOptions();
        setInterval(fetchState, POLL_INTERVAL_MS);
    </script>
</body>
