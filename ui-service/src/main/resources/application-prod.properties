# ── Producción: Aiven PostgreSQL ──────────────────────────────────────────────
# DATABASE_URL provisto por Aiven. Incluye sslmode=require.
slidehub.base-url=${BASE_URL:https://slide.lat}
slidehub.gateway.url=${GATEWAY_URL:${slidehub.base-url:https://slide.lat}}
slidehub.meeting.session-ttl-minutes=${MEETING_SESSION_TTL_MINUTES:120}

# OAuth2 callbacks can mismatch behind proxies/custom domains if inferred host differs.
# Force canonical callback host in production.
spring.security.oauth2.client.registration.github.redirect-uri=${OAUTH_REDIRECT_BASE_URL:https://slide.lat}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_BASE_URL:https://slide.lat}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google-drive.redirect-uri=${OAUTH_REDIRECT_BASE_URL:https://slide.lat}/login/oauth2/code/{registrationId}

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=public

# Flyway contra PostgreSQL en Aiven
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=public
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true
spring.flyway.connect-retries=10

# Logging detallado de Flyway para diagnóstico
logging.level.org.flywaydb=DEBUG
logging.level.org.flywaydb.core=DEBUG
